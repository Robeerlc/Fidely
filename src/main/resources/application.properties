spring.application.name=fidely
server.port=8080

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.kafka.bootstrap-servers=193.70.44.51:9094
spring.kafka.consumer.group-id=fidely-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USERNAME}
spring.mail.password=${EMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

jwt.secret-key=${JWT_SECRET_KEY}
jwt.expiration=${JWT_EXPIRATION}
jwt.email-expiration=${JWT_EMAIL_EXPIRATION}

fidely.wallet.google.issuer-id=${GOOGLE_ISSUER_ID}

# Apple Wallet — requiere cuenta Apple Developer
# fidely.wallet.apple.pass-type-id=${APPLE_PASS_TYPE_ID:pass.com.fidely.loyalty}
# fidely.wallet.apple.team-id=${APPLE_TEAM_ID}
# fidely.wallet.apple.p12-base64=${APPLE_P12_BASE64}
# fidely.wallet.apple.p12-password=${APPLE_P12_PASSWORD}
# fidely.wallet.apple.wwdr-base64=${APPLE_WWDR_BASE64}

# URL pública del backend (para enlace de verificación de email)
fidely.app.base-url=${APP_BASE_URL:http://localhost:8080}

# Google Cloud Storage
fidely.storage.gcs-bucket=${GCS_BUCKET_NAME:fidely-uploads}

stripe.secret-key=${STRIPE_SECRET_KEY:}
stripe.price-id=${STRIPE_PRICE_ID:}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}